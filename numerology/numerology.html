<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>律動能量 | 命運解碼室</title>
    <link rel="stylesheet" href="https://branddecoderai.com/astro-bot/style_pk_v3.css?v=2">
    <style>
        /* 專屬數字能量的微調 CSS (如果 style_pk_v3.css 已包含，可刪除此段) */
        #pixi-container { position: fixed; inset: 0; z-index: -10; pointer-events: none; opacity: 0.6; }
        
        .numbers-grid-inner {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px;
        }
        .number-box {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .number-box h4 { margin: 0; font-size: 11px; color: #888; font-weight: normal; letter-spacing: 1px; }
        .number-box p { margin: 5px 0 0 0; font-size: 36px; font-weight: bold; color: var(--gold-light); text-shadow: 0 0 10px var(--gold); }
        .interpretation-content { line-height: 1.8; color: #E0E0E0; font-size: 14px; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>
    
    <div id="pixi-container"></div>

    <div id="ui-layer">
        
        <div id="step-calibration" class="screen active">
            <div class="loader-ripple"></div>
            <p class="status-text">同步星軌數據中...</p>
        </div>

        <div id="step-ritual" class="screen hidden">
            <h1 class="master-title">歡迎來到解碼室，<span id="ui-name"></span></h1>
            <button id="btn-activate" class="glow-button">
                啟動律動能量 <br>
                <span class="cost-text">(靈力準備中...)</span>
            </button>
        </div>

        <div id="step-result" class="screen hidden">
            
            <div id="numbers-grid" class="glass-panel" style="padding: 25px;">
                <div style="display: flex; flex-direction: column; gap: 20px; text-align: center;">
                    <div>
                        <h4 style="color: #A0A0B0; font-size: 14px; margin: 0 0 10px 0; font-weight: normal; letter-spacing: 2px;">核心能量</h4>
                        <p id="result-core" style="font-size: 72px; font-weight: bold; color: #E5C07B; text-shadow: 0 0 30px rgba(229,192,123,0.6); margin: 0; line-height: 1;">--</p>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; gap: 15px; margin-top: 10px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
                        <div style="flex: 1;">
                            <h4 style="color: #888; font-size: 12px; margin: 0 0 8px 0; font-weight: normal;">幸運共振</h4>
                            <p id="result-lucky" style="font-size: 20px; color: #FFFFFF; letter-spacing: 4px; margin: 0;">-- · -- · --</p>
                        </div>
                        <div style="flex: 1; border-left: 1px solid rgba(255,255,255,0.1);">
                            <h4 style="color: #888; font-size: 12px; margin: 0 0 8px 0; font-weight: normal;">財富金鑰</h4>
                            <p id="result-wealth" style="font-size: 20px; color: #F2D3A1; letter-spacing: 4px; margin: 0; font-weight: bold;">-- · --</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="ai-interpretation" class="glass-panel" style="margin-top: 20px; text-align: left;">
                <h3 style="margin-top:0; font-size: 14px; color: var(--gold);">大師指引：</h3>
                <div id="interpretation-text" class="interpretation-content">大師正在為您具現報告...</div>
            </div>

            <div class="action-bar" style="margin-top: 30px;">
                <button id="btn-close-result" class="glow-button" style="width: 100%; padding: 15px; font-size: 16px;">
                    關閉頁面回 LINE 查看
                </button>
                <button id="btn-share" class="secondary-button" style="width: 100%; margin-top: 15px;">生成分享字卡</button>
            </div>
        </div>

    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/pixi.min.js"></script> 
    <script src="/env.js?v=6"></script>      
    <script src="main_logic.js"></script>  

</body>
</html>

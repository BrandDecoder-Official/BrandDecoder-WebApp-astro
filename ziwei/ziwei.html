<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder - 命運星盤</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-color: #0A0B10; /* 基底色 */
            --bg-purple: #150525; /* 深紫暈 */
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --gray: #333;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #E0E0E0;
            font-family: 'Noto Serif TC', serif; 
            overflow: hidden; /* 隱藏滾動條，確保沉浸感 */
            height: 100vh; position: relative;
        }

        /* ----------------------------------------------------------- */
        /* 🌌 沉浸式背景層 (沉浸式深空) */
        /* ----------------------------------------------------------- */
        .universal-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* 極深藍與極深紫的緩慢漸層，創造深邃感 */
            background: radial-gradient(circle at 50% 50%, var(--bg-purple) 0%, var(--bg-color) 100%);
            z-index: 0;
            opacity: 0.8;
            /* 緩慢的旋轉動畫，增加高級感 */
            animation: rotateGalaxy 120s linear infinite;
        }
        @keyframes rotateGalaxy { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🔮 每一個步驟的容器 (沉浸式對話流架構) */
        .step-section {
            position: absolute; top: 50%; left: 50%; width: 90%; max-width: 400px; text-align: center; z-index: 10;
            transform: translate(-50%, -30%); opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .step-section.active { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
        .step-section.exit-up { transform: translate(-50%, -70%); opacity: 0; pointer-events: none; }

        h2 { color: var(--gold); font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; line-height: 1.6; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; letter-spacing: 1px; }

        .btn-choice {
            display: block; width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px;
            color: var(--gold-light); font-size: 18px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-choice:active, .btn-choice.selected {
            background: rgba(212, 175, 55, 0.15); border-color: var(--gold);
            transform: scale(0.98); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 14px; color: #aaa; margin-bottom: 8px; padding-left: 5px; }
        input[type="date"], select {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(0,0,0,0.6); border: 1px solid var(--gray);
            color: var(--gold-light); font-size: 16px; border-radius: 8px;
            color-scheme: dark; appearance: none;
        }
        input[type="date"]:focus, select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn-submit {
            width: 100%; padding: 18px; margin-top: 15px;
            background: linear-gradient(135deg, #D4AF37, #AA7C11);
            border: none; border-radius: 8px;
            color: #000; font-size: 18px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s;
        }
        .btn-submit:active { transform: scale(0.96); }

        /* ----------------------------------------------------------- */
        /* ✨ 終極升級：沉浸式 AI 深度解碼載入畫面 */
        /* ----------------------------------------------------------- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 1s ease;
            overflow: hidden; /* 防止特效溢出 */
        }
        #loading-overlay.show { opacity: 1; pointer-events: auto; }

        /* Layer 1: 深邃冷調星空 (專屬紫微斗數場景) */
        #loading-overlay .loading-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1c2e 0%, var(--bg-color) 100%);
            opacity: 0.6;
            animation: rotateGalaxy 180s linear infinite;
        }

        /* Layer 2: 偽十二宮位天盤線條 (半透明幾何結構) */
        .astrolabe-grid {
            position: absolute; width: 150vw; height: 150vw;
            max-width: 1000px; max-height: 1000px;
            border-radius: 50%;
            /* 繪制 radial 幾何線條 */
            background-image: 
                radial-gradient(circle, rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                repeating-radial-gradient(rgba(212, 175, 55, 0.03) 0, rgba(212, 175, 55, 0.03) 1px, transparent 1px, transparent 50px),
                repeating-conic-gradient(from 0deg, rgba(212, 175, 55, 0.02) 0deg 10deg, transparent 10deg 30deg);
            z-index: 1;
            /* 與文字一起呼吸 */
            animation: gridPulse 4s infinite; 
        }
        @keyframes gridPulse { 0% { opacity: 0.5; transform: rotate(0deg) scale(1); } 50% { opacity: 1; transform: rotate(2deg) scale(1.02); } 100% { opacity: 0.5; transform: rotate(0deg) scale(1); } }

        /* Layer 3: 金色歸位流星 (飛向中央) */
        .meteor {
            position: absolute; background: linear-gradient(to right, rgba(255,255,255,0), rgba(212, 175, 55, 0.8));
            width: 100px; height: 2px; border-radius: 2px; z-index: 2; opacity: 0;
        }
        /* 定義多組不同角度飛向中央的流星 */
        .meteor.m1 { top: 10%; left: -10%; animation: shooting 3s 1s infinite; transform: rotate(30deg); }
        .meteor.m2 { top: 80%; left: -10%; animation: shooting 3s 2s infinite; transform: rotate(-30deg); }
        .meteor.m3 { top: -10%; right: 10%; animation: shooting 3s 1.5s infinite; transform: rotate(120deg); }
        .meteor.m4 { bottom: -10%; right: 20%; animation: shooting 3s 0.5s infinite; transform: rotate(210deg); }

        @keyframes shooting {
            0% { transform: translate(0, 0) rotate(inherit); opacity: 0; width: 0; }
            30% { opacity: 1; width: 100px; }
            100% { transform: translate(50vw, 50vh) rotate(inherit); opacity: 0; width: 0; } /* 飛向螢幕中心 */
        }
        /* 針對手機版修正流星終點 */
        @media (max-width: 600px) { @keyframes shooting { 0% { opacity: 0; width: 0; } 30% { opacity: 1; width: 80px; } 100% { transform: translate(40vw, 40vh) rotate(inherit); opacity: 0; width: 0; } } }

        /* Layer 4: 呼吸燈文字 (保留核心優點) */
        .loading-content { z-index: 10; text-align: center; }
        .bd-hub {
            font-size: 40px; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--gold));
            animation: hubGlow 4s infinite;
        }
        @keyframes hubGlow { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 20px var(--gold)); } 100% { opacity: 0.8; transform: scale(1); } }

        .loading-text {
            color: var(--gold);
            font-size: 16px;
            letter-spacing: 4px;
            /* 保留你喜歡的持續呼吸特效 */
            animation: textPulse 4s infinite; 
        }
        @keyframes textPulse { 
            0% { opacity: 0.4; text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); } 
            50% { opacity: 1; text-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold-light); color: var(--gold-light); } 
            100% { opacity: 0.4; text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); } 
        }
    </style>
</head>
<body>
    <div class="universal-bg"></div>

    <div id="step-1" class="step-section active">
        <h2>命運的齒輪<br>從陰陽開始轉動</h2>
        <div class="subtitle">請選擇您的生理性別，以定大運順逆</div>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'M', this)">乾 (男性)</button>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'F', this)">坤 (女性)</button>
    </div>

    <div id="step-2" class="step-section">
        <h2>您習慣仰望太陽<br>還是追隨月亮的軌跡？</h2>
        <div class="subtitle">請選擇您的星辰曆法</div>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'solar', this)">太陽 (國曆)</button>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'lunar', this)">太陰 (農曆)</button>
    </div>

    <div id="step-3" class="step-section">
        <h2>鎖定您的時空座標</h2>
        
        <div class="form-group">
            <label class="form-label">降生之日</label>
            <input type="date" id="input-date" required>
        </div>

        <div class="form-group">
            <label class="form-label">降生時辰</label>
            <select id="input-time">
                <option value="unknown">時辰不詳 (AI 輔助校正)</option>
                <option value="子">子時 (23:00 - 00:59)</option>
                <option value="丑">丑時 (01:00 - 02:59)</option>
                <option value="寅">寅時 (03:00 - 04:59)</option>
                <option value="卯">卯時 (05:00 - 06:59)</option>
                <option value="辰">辰時 (07:00 - 08:59)</option>
                <option value="巳">巳時 (09:00 - 10:59)</option>
                <option value="午">午時 (11:00 - 12:59)</option>
                <option value="未">未時 (13:00 - 14:59)</option>
                <option value="申">申時 (15:00 - 16:59)</option>
                <option value="酉">酉時 (17:00 - 18:59)</option>
                <option value="戌">戌時 (19:00 - 20:59)</option>
                <option value="亥">亥時 (21:00 - 22:59)</option>
            </select>
        </div>

        <button class="btn-submit" onclick="submitAstrolabe()">注入靈力，啟動星盤</button>
    </div>

    <div id="step-4" class="step-section">
        <h2>解碼完成</h2>
        <div id="result-text" style="text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; font-size: 14px; line-height: 1.8; color: #ccc;">
            這裡將顯示 AI 輸出的紫微斗數深度解析...
        </div>
        <button class="btn-submit" style="margin-top: 30px;" onclick="location.reload()">再次解碼</button>
    </div>

    <div id="loading-overlay">
        <div class="loading-bg"></div>
        
        <div class="astrolabe-grid"></div>
        
        <div class="meteor m1"></div><div class="meteor m2"></div>
        <div class="meteor m3"></div><div class="meteor m4"></div>

        <div class="loading-content">
            <div class="bd-hub">🔮</div> 
            <div class="loading-text" id="loading-msg">啟動 AI 命運大腦深度解碼</div>
        </div>
    </div>

    <script>
        // 集中儲存使用者的命理資料
        const userAstrolabeData = { gender: '', calendar: '', date: '', time: '' };

        // 處理步驟切換與自動推進
        function makeChoice(currentStep, key, value, btnElement) {
            userAstrolabeData[key] = value;
            btnElement.classList.add('selected');

            // 轉場：舊的往上飄，新的浮現
            setTimeout(() => {
                const currentDiv = document.getElementById(`step-${currentStep}`);
                const nextDiv = document.getElementById(`step-${currentStep + 1}`);
                currentDiv.classList.remove('active');
                currentDiv.classList.add('exit-up');
                nextDiv.classList.add('active');
            }, 400);
        }

        // 最終提交表單
        function submitAstrolabe() {
            const y = document.getElementById('input-year').value;
            const m = document.getElementById('input-month').value;
            const d = document.getElementById('input-day').value;
            const finalDate = `${y}-${m}-${d}`;
            const time = document.getElementById('input-time').value;
            const gender = userAstrolabeData.gender === 'M' ? '乾(男)' : '坤(女)';
            const cal = userAstrolabeData.calendar === 'solar' ? '國曆' : '農曆';

            // 🌟 核心防錯：最終確認
            const isConfirmed = confirm(
                `確認星辰座標？\n\n` +
                `● 性別：${gender}\n` +
                `● 曆法：${cal}\n` +
                `● 日期：${finalDate}\n` +
                `● 時辰：${time}時\n\n` +
                `⚠️ 提醒：解碼將扣除 50 點靈力，資料將永久綁定。`
            );

            if(!isConfirmed) return; // 使用者按取消，留在原地修改

            userAstrolabeData.date = dateInput;
            userAstrolabeData.time = document.getElementById('input-time').value;

            // 🌌 啟動終極沉浸式載入遮罩
            document.getElementById('loading-overlay').classList.add('show');

            // 營造 AI 解算的神秘文字氛圍 (搭配呼吸燈特效)
            setTimeout(() => { document.getElementById('loading-msg').innerText = "排盤中：定紫微、安108星曜座標..."; }, 2000);
            setTimeout(() => { document.getElementById('loading-msg').innerText = "連結宇宙阿卡西紀錄，進行深度解碼..."; }, 4500);

            console.log("🚀 準備發送至 Cloud Run 的資料：", userAstrolabeData);
            
            // [展示用] 模擬 API 回傳成功，5秒後切換到結果頁
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.remove('show');
                const currentDiv = document.getElementById(`step-3`);
                const nextDiv = document.getElementById(`step-4`);
                currentDiv.classList.remove('active');
                currentDiv.classList.add('exit-up');
                nextDiv.classList.add('active');
            }, 7000);
        }
    </script>
</body>
</html>

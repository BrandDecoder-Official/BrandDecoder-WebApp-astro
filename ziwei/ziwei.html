<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder - 命運星盤</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/env.js"></script>
    
    <style>
        :root {
            --bg-color: #0A0B10;
            --bg-purple: #150525;
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --gray: #333;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #E0E0E0;
            font-family: 'Noto Serif TC', serif; 
            overflow: hidden; height: 100vh; position: relative;
        }

        /* 🌌 沉浸式深空背景 */
        .universal-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--bg-purple) 0%, var(--bg-color) 100%);
            z-index: 0; opacity: 0.8;
            animation: rotateGalaxy 120s linear infinite;
        }
        @keyframes rotateGalaxy { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🔮 步驟容器 */
        .step-section {
            position: absolute; top: 50%; left: 50%; width: 90%; max-width: 400px; text-align: center; z-index: 10;
            transform: translate(-50%, -30%); opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .step-section.active { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
        .step-section.exit-up { transform: translate(-50%, -70%); opacity: 0; pointer-events: none; }

        h2 { color: var(--gold); font-weight: 300; letter-spacing: 2px; margin-bottom: 25px; line-height: 1.6; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; letter-spacing: 1px; }

        /* 按鈕與選單樣式 */
        .btn-choice {
            display: block; width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px;
            color: var(--gold-light); font-size: 18px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-choice:active, .btn-choice.selected {
            background: rgba(212, 175, 55, 0.15); border-color: var(--gold);
            transform: scale(0.98); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; padding-left: 5px; }
        
        /* 三柱日期排版 */
        .date-group { display: flex; gap: 8px; }
        .date-group select { flex: 1; text-align-last: center; }

        select {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(0,0,0,0.6); border: 1px solid var(--gray);
            color: var(--gold-light); font-size: 16px; border-radius: 8px;
            color-scheme: dark; appearance: none;
        }
        select:focus { outline: none; border-color: var(--gold); }

        .btn-submit {
            width: 100%; padding: 18px; margin-top: 15px;
            background: linear-gradient(135deg, #D4AF37, #AA7C11);
            border: none; border-radius: 8px;
            color: #000; font-size: 18px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: transform 0.2s;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }

        /* ✨ 載入遮罩 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease; overflow: hidden;
        }
        #loading-overlay.show { opacity: 1; pointer-events: auto; }

        .loading-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1c2e 0%, var(--bg-color) 100%); opacity: 0.6; }
        .astrolabe-grid {
            position: absolute; width: 150vw; height: 150vw; max-width: 900px; max-height: 900px;
            border-radius: 50%; opacity: 0.3;
            background-image: 
                repeating-radial-gradient(rgba(212, 175, 55, 0.05) 0, rgba(212, 175, 55, 0.05) 1px, transparent 1px, transparent 50px),
                repeating-conic-gradient(from 0deg, rgba(212, 175, 55, 0.02) 0deg 30deg, transparent 30deg 60deg);
            animation: gridPulse 4s infinite; 
        }
        @keyframes gridPulse { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }

        .meteor { position: absolute; background: linear-gradient(to right, rgba(255,255,255,0), var(--gold)); width: 100px; height: 2px; opacity: 0; }
        .m1 { top: 10%; left: -10%; animation: shooting 3s 1s infinite; transform: rotate(30deg); }
        .m2 { top: 80%; left: -10%; animation: shooting 3s 2s infinite; transform: rotate(-30deg); }
        .m3 { top: -10%; right: 10%; animation: shooting 3s 1.5s infinite; transform: rotate(120deg); }
        .m4 { bottom: -10%; right: 20%; animation: shooting 3s 0.5s infinite; transform: rotate(210deg); }
        @keyframes shooting { 0% { opacity: 0; transform: translate(0, 0) rotate(inherit); } 30% { opacity: 1; } 100% { opacity: 0; transform: translate(50vw, 50vh) rotate(inherit); } }

        .loading-content { z-index: 10; text-align: center; }
        .loading-text { color: var(--gold); font-size: 16px; letter-spacing: 4px; animation: textPulse 4s infinite; }
        @keyframes textPulse { 
            0%, 100% { opacity: 0.4; text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); } 
            50% { opacity: 1; text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold-light); color: var(--gold-light); } 
        }
    </style>
</head>
<body>
    <div class="universal-bg"></div>

    <div id="step-1" class="step-section active">
        <h2>命運的齒輪<br>從陰陽開始轉動</h2>
        <div class="subtitle">請選擇您的生理性別</div>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'M', this)">乾 (男性)</button>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'F', this)">坤 (女性)</button>
    </div>

    <div id="step-2" class="step-section">
        <h2>您習慣仰望太陽<br>還是追隨月亮的軌跡？</h2>
        <div class="subtitle">請選擇您的星辰曆法</div>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'solar', this)">太陽 (國曆)</button>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'lunar', this)">太陰 (農曆)</button>
    </div>

    <div id="step-3" class="step-section">
        <h2>鎖定您的時空座標</h2>
        <div class="form-group">
            <label class="form-label">降生之日</label>
            <div class="date-group">
                <select id="input-year"></select>
                <select id="input-month"></select>
                <select id="input-day"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">降生時辰</label>
            <select id="input-time">
                <option value="unknown">時辰不詳 (AI 輔助校正)</option>
                <option value="子">子時 (23:00 - 00:59)</option><option value="丑">丑時 (01:00 - 02:59)</option>
                <option value="寅">寅時 (03:00 - 04:59)</option><option value="卯">卯時 (05:00 - 06:59)</option>
                <option value="辰">辰時 (07:00 - 08:59)</option><option value="巳">巳時 (09:00 - 10:59)</option>
                <option value="午">午時 (11:00 - 12:59)</option><option value="未">未時 (13:00 - 14:59)</option>
                <option value="申">申時 (15:00 - 16:59)</option><option value="酉">酉時 (17:00 - 18:59)</option>
                <option value="戌">戌時 (19:00 - 20:59)</option><option value="亥">亥時 (21:00 - 22:59)</option>
            </select>
        </div>
        <button id="btn-submit-main" class="btn-submit" onclick="submitAstrolabe()">注入靈力，啟動星盤</button>
    </div>

    <div id="step-4" class="step-section">
        <h2>解碼完成</h2>
        <div id="result-text" style="text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; font-size: 15px; line-height: 1.8; color: #E0E0E0; max-height: 50vh; overflow-y: auto; white-space: pre-wrap;">
            </div>
        <button class="btn-submit" style="margin-top: 20px;" onclick="liff.closeWindow();">完成解碼 (關閉)</button>
    </div>

    <div id="loading-overlay">
        <div class="loading-bg"></div>
        <div class="astrolabe-grid"></div>
        <div class="meteor m1"></div><div class="meteor m2"></div><div class="meteor m3"></div><div class="meteor m4"></div>
        <div class="loading-content">
            <div style="font-size: 50px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold));">🔮</div> 
            <div class="loading-text" id="loading-msg">系統初始化中...</div>
        </div>
    </div>

    <script>
        // 1. 全局變數與 LIFF 初始化
        const userAstrolabeData = { gender: '', calendar: '', date: '', time: '' };
        let currentIdToken = ""; // 存放使用者的 LINE Token

        async function initLIFF() {
            try {
                // 👇 把原本的 LIFF_ID 改成 ENV.ZIWEI_LIFF_ID
                await liff.init({ liffId: ENV.ZIWEI_LIFF_ID }); 
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                currentIdToken = liff.getIDToken();
                console.log("LIFF 初始化成功，取得 Token。");
            } catch (err) {
                console.error("LIFF 初始化失敗：", err);
                alert("系統初始化失敗，請在 LINE 內部開啟！");
            }
        }

        // 2. 初始化日期滾輪
        function initDatePicker() {
            const ySelect = document.getElementById('input-year');
            const mSelect = document.getElementById('input-month');
            const dSelect = document.getElementById('input-day');

            for(let i = 2015; i >= 1940; i--) {
                let opt = new Option(i + ' 年', i);
                if(i === 1990) opt.selected = true;
                ySelect.add(opt);
            }
            for(let i = 1; i <= 12; i++) {
                let val = i < 10 ? '0'+i : i;
                mSelect.add(new Option(val + ' 月', val));
            }
            function updateDays() {
                const y = parseInt(ySelect.value), m = parseInt(mSelect.value);
                const days = new Date(y, m, 0).getDate();
                const current = dSelect.value;
                dSelect.innerHTML = ''; 
                for(let i = 1; i <= days; i++) {
                    let val = i < 10 ? '0'+i : i;
                    dSelect.add(new Option(val + ' 日', val));
                }
                if(current && current <= days) dSelect.value = current;
            }
            ySelect.onchange = mSelect.onchange = updateDays;
            updateDays();
        }

        // 網頁載入時執行
        window.onload = async () => {
            initDatePicker();
            await initLIFF();
        };

        // 3. UI 步驟切換邏輯
        function makeChoice(currentStep, key, value, btn) {
            userAstrolabeData[key] = value;
            btn.classList.add('selected');
            setTimeout(() => {
                const cur = document.getElementById(`step-${currentStep}`);
                const next = document.getElementById(`step-${currentStep + 1}`);
                cur.classList.remove('active'); cur.classList.add('exit-up');
                next.classList.add('active');
            }, 400);
        }

        // 4. 🌟 核心：提交表單與呼叫後端 API 🌟
        async function submitAstrolabe() {
            // 防呆：確認前面兩步是否有選
            if (!userAstrolabeData.gender || !userAstrolabeData.calendar) {
                alert("系統錯誤：遺失基本資料，請重新整理頁面。");
                return;
            }

            const y = document.getElementById('input-year').value;
            const m = document.getElementById('input-month').value;
            const d = document.getElementById('input-day').value;
            const finalDate = `${y}-${m}-${d}`;
            const time = document.getElementById('input-time').value;

            // 最終確認視窗
            const genderText = userAstrolabeData.gender === 'M' ? '乾(男)' : '坤(女)';
            const calText = userAstrolabeData.calendar === 'solar' ? '國曆' : '農曆';
            if(!confirm(`確認開啟星盤？\n\n● 性別：${genderText}\n● 曆法：${calText}\n● 日期：${finalDate}\n● 時辰：${time}時\n\n⚠️ 將消耗 50 點靈力進行解碼。`)) return;

            // 鎖定按鈕，防止重複點擊
            document.getElementById('btn-submit-main').disabled = true;

            userAstrolabeData.date = finalDate;
            userAstrolabeData.time = time;
            
            // 啟動載入遮罩
            document.getElementById('loading-overlay').classList.add('show');
            document.getElementById('loading-msg').innerText = "驗證靈魂印記與靈力餘額...";

            try {
                // 營造 AI 運算的氛圍
                setTimeout(() => { document.getElementById('loading-msg').innerText = "排盤中：定紫微、安108星曜座標..."; }, 2500);
                setTimeout(() => { document.getElementById('loading-msg').innerText = "連結宇宙阿卡西紀錄，進行深度解碼..."; }, 6000);

                // 🚀 正式發送 API 請求給 Cloud Run
                const response = await fetch(`${API_URL}/api/divination/ziwei`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentIdToken}` // 傳送 LINE 身分
                    },
                    body: JSON.stringify({
                        birthData: userAstrolabeData // 將生辰八字打包送出
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 成功：隱藏載入畫面，顯示結果
                    document.getElementById('loading-overlay').classList.remove('show');
                    document.getElementById('step-3').classList.remove('active');
                    document.getElementById('step-3').classList.add('exit-up');
                    document.getElementById('step-4').classList.add('active');
                    
                    // 將 AI 解析結果塞入結果視窗 (使用 marked 或直接塞入 text)
                    document.getElementById('result-text').innerText = result.replyText;
                } else {
                    // 失敗 (例如：靈力不足)
                    throw new Error(result.msg || "解碼失敗，請稍後再試。");
                }

            } catch (error) {
                console.error("API 呼叫錯誤：", error);
                alert("錯誤：" + error.message);
                // 發生錯誤時，隱藏載入畫面並解鎖按鈕
                document.getElementById('loading-overlay').classList.remove('show');
                document.getElementById('btn-submit-main').disabled = false;
            }
        }
    </script>
</body>
</html>

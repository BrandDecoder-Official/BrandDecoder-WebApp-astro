<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>命運解碼室 | 紫微大運</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/env.js?V=5"></script>
    <script src="/pixi.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0A0B10;
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --gray: #333;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: #E0E0E0;
            font-family: 'PingFang TC', 'Noto Serif TC', serif; 
            overflow: hidden; height: 100vh; position: relative;
        }

        /* 🌟 PixiJS 全局背景畫布 */
        #pixi-background { position: absolute; inset: 0; z-index: -1; }

        /* 🔮 步驟容器 (加上毛玻璃效果讓文字更清楚) */
        .step-section {
            position: absolute; top: 50%; left: 50%; width: 90%; max-width: 400px; text-align: center; z-index: 10;
            transform: translate(-50%, -30%); opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: rgba(10, 11, 16, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 30px 20px; border-radius: 16px; border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .step-section.active { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
        .step-section.exit-up { transform: translate(-50%, -70%); opacity: 0; pointer-events: none; }

        h2 { color: var(--gold); font-weight: 300; letter-spacing: 2px; margin-bottom: 25px; line-height: 1.6; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); margin-top: 0;}
        .subtitle { font-size: 14px; color: #aaa; margin-bottom: 20px; letter-spacing: 1px; }

        /* 按鈕與選單樣式 */
        .btn-choice {
            display: block; width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 12px;
            color: var(--gold-light); font-size: 18px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-choice:active, .btn-choice.selected {
            background: rgba(212, 175, 55, 0.2); border-color: var(--gold);
            transform: scale(0.98); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 12px; color: #ccc; margin-bottom: 8px; padding-left: 5px; }
        
        .date-group { display: flex; gap: 8px; }
        .date-group select { flex: 1; text-align-last: center; }

        select {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(0,0,0,0.8); border: 1px solid var(--gray);
            color: var(--gold-light); font-size: 16px; border-radius: 8px;
            color-scheme: dark; appearance: none;
        }
        select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.2); }

        .btn-submit {
            width: 100%; padding: 18px; margin-top: 15px;
            background: linear-gradient(135deg, #D4AF37, #AA7C11);
            border: none; border-radius: 8px;
            color: #000; font-size: 18px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: transform 0.2s;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }

        /* ✨ 載入遮罩 (僅文字) */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 11, 16, 0.6); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 15vh;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        #loading-overlay.show { opacity: 1; pointer-events: auto; }
        
        .loading-text { 
            color: var(--gold-light); font-size: 18px; letter-spacing: 4px; font-weight: bold;
            animation: textPulse 2s infinite; 
            background: rgba(0,0,0,0.6); padding: 15px 30px; border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(5px);
        }
        @keyframes textPulse { 
            0%, 100% { opacity: 0.7; text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); } 
            50% { opacity: 1; text-shadow: 0 0 20px var(--gold); } 
        }
    </style>
</head>
<body>
    <div id="pixi-background"></div>

    <div id="step-1" class="step-section active">
        <h2>命運的齒輪<br>從陰陽開始轉動</h2>
        <div class="subtitle">請選擇您的生理性別</div>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'M', this)">乾造 (男命)</button>
        <button class="btn-choice" onclick="makeChoice(1, 'gender', 'F', this)">坤造 (女命)</button>
    </div>

    <div id="step-2" class="step-section">
        <h2>您習慣仰望太陽<br>還是追隨月亮的軌跡？</h2>
        <div class="subtitle">請選擇星辰曆法</div>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'solar', this)">太陽曆 (國曆)</button>
        <button class="btn-choice" onclick="makeChoice(2, 'calendar', 'lunar', this)">太陰曆 (農曆)</button>
    </div>

    <div id="step-3" class="step-section">
        <h2>鎖定您的時空座標</h2>
        <div class="form-group">
            <label class="form-label">降生之日</label>
            <div class="date-group">
                <select id="input-year"></select>
                <select id="input-month"></select>
                <select id="input-day"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">降生時辰</label>
            <select id="input-time">
                <option value="子">子時 (23:00 - 00:59)</option><option value="丑">丑時 (01:00 - 02:59)</option>
                <option value="寅">寅時 (03:00 - 04:59)</option><option value="卯">卯時 (05:00 - 06:59)</option>
                <option value="辰">辰時 (07:00 - 08:59)</option><option value="巳">巳時 (09:00 - 10:59)</option>
                <option value="午">午時 (11:00 - 12:59)</option><option value="未">未時 (13:00 - 14:59)</option>
                <option value="申">申時 (15:00 - 16:59)</option><option value="酉">酉時 (17:00 - 18:59)</option>
                <option value="戌">戌時 (19:00 - 20:59)</option><option value="亥">亥時 (21:00 - 22:59)</option>
            </select>
        </div>
        <button id="btn-submit-main" class="btn-submit" onclick="submitAstrolabe()">啟動 108 星曜解碼</button>
    </div>

    <div id="step-4" class="step-section" style="max-width: 90%; background: rgba(10, 11, 16, 0.85);">
        <h2>天命具現化完成</h2>
        <div style="font-size: 13px; color: #4CAF50; margin-bottom: 15px; border: 1px solid rgba(76, 175, 80, 0.4); padding: 10px; border-radius: 8px; background: rgba(76, 175, 80, 0.1);">
            ✨ 尊爵版命盤報告已同步推播至您的 LINE 聊天室
        </div>
        <div id="result-text" style="text-align: left; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; font-size: 14px; line-height: 1.8; color: #E0E0E0; max-height: 45vh; overflow-y: auto; white-space: pre-wrap; border-left: 3px solid var(--gold);">
            </div>
        <button class="btn-submit" style="margin-top: 20px;" onclick="liff.closeWindow();">關閉星盤回 LINE 查看</button>
    </div>

    <div id="loading-overlay">
        <div class="loading-text" id="loading-msg">定紫微、安星曜...</div>
    </div>

    <script>
        const userAstrolabeData = { gender: '', calendar: '', date: '', time: '' };
        let currentIdToken = ""; 
        
        // --- 🌌 PixiJS 全域特效控制器 ---
        let pixiApp;
        let astrolabeGrid, astrolabeCore;
        let isCalculating = false; // 控制特效狀態切換
        const particles = [];

        function initPixiBackground() {
            const container = document.getElementById('pixi-background');
            pixiApp = new PIXI.Application({
                resizeTo: window,
                transparent: true,
                autoDensity: true,
                resolution: window.devicePixelRatio || 1,
            });
            container.appendChild(pixiApp.view);

            // 1. 星塵背景 (緩慢漂浮)
            const starContainer = new PIXI.Container();
            pixiApp.stage.addChild(starContainer);
            for(let i=0; i<150; i++) {
                let star = new PIXI.Graphics();
                star.beginFill(0xFFFFFF, Math.random() * 0.8 + 0.2);
                star.drawCircle(0, 0, Math.random() * 1.5);
                star.endFill();
                star.x = Math.random() * pixiApp.screen.width;
                star.y = Math.random() * pixiApp.screen.height;
                star.vy = (Math.random() - 0.5) * 0.2;
                starContainer.addChild(star);
            }

            // 2. 命盤中心組件
            const center = new PIXI.Container();
            center.x = pixiApp.screen.width / 2;
            center.y = pixiApp.screen.height / 2; // 置中
            pixiApp.stage.addChild(center);

            // 3. 12 宮位立體星軌
            astrolabeGrid = new PIXI.Graphics();
            astrolabeGrid.lineStyle(1.5, 0xD4AF37, 0.5); // 金色
            astrolabeGrid.drawCircle(0, 0, 180);
            astrolabeGrid.lineStyle(1, 0xD4AF37, 0.3);
            astrolabeGrid.drawCircle(0, 0, 110);
            for(let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                astrolabeGrid.lineStyle(1.5, 0xD4AF37, 0.4);
                astrolabeGrid.moveTo(Math.cos(angle) * 110, Math.sin(angle) * 110);
                astrolabeGrid.lineTo(Math.cos(angle) * 180, Math.sin(angle) * 180);
            }
            astrolabeGrid.alpha = 0.2; // 潛伏期暗淡
            center.addChild(astrolabeGrid);

            // 4. 核心
            astrolabeCore = new PIXI.Graphics();
            astrolabeCore.beginFill(0x4A148C, 0.8); // 深紫
            astrolabeCore.drawCircle(0, 0, 35);
            astrolabeCore.endFill();
            astrolabeCore.lineStyle(2, 0xD8B4E2, 0.5);
            astrolabeCore.drawCircle(0, 0, 45);
            astrolabeCore.alpha = 0.3; // 潛伏期暗淡
            center.addChild(astrolabeCore);

            const elementColors = [0xFFD700, 0x4CAF50, 0x2196F3, 0xF44336, 0x795548]; // 金木水火土

            // 動畫循環
            let tick = 0;
            pixiApp.ticker.add((delta) => {
                tick += delta;

                // 星塵飄動
                starContainer.children.forEach(star => {
                    star.y += star.vy * delta;
                    if(star.y < 0) star.y = pixiApp.screen.height;
                    if(star.y > pixiApp.screen.height) star.y = 0;
                });

                if (!isCalculating) {
                    // 【潛伏期】：緩慢旋轉，微弱呼吸
                    astrolabeGrid.rotation += 0.001 * delta;
                    astrolabeCore.scale.set(1 + Math.sin(tick * 0.05) * 0.05);
                } else {
                    // 【爆發期】：高亮、高速、五行撞擊
                    astrolabeGrid.alpha = Math.min(1, astrolabeGrid.alpha + 0.05);
                    astrolabeCore.alpha = Math.min(1, astrolabeCore.alpha + 0.05);
                    
                    astrolabeGrid.rotation += 0.01 * delta; // 轉速加快
                    astrolabeCore.scale.set(1 + Math.sin(tick * 0.2) * 0.15); // 劇烈呼吸

                    // 隨機生成五行能量球
                    if (Math.random() < 0.2) {
                        const p = new PIXI.Graphics();
                        p.beginFill(elementColors[Math.floor(Math.random() * elementColors.length)], 0.9);
                        p.drawCircle(0, 0, 5);
                        p.endFill();
                        
                        const spawnAngle = Math.random() * Math.PI * 2;
                        p.x = Math.cos(spawnAngle) * (pixiApp.screen.width / 2 + 100);
                        p.y = Math.sin(spawnAngle) * (pixiApp.screen.height / 2 + 100);
                        p.speed = 6 + Math.random() * 4;
                        center.addChild(p);
                        particles.push(p);
                    }

                    // 能量球撞擊核心
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        const dist = Math.sqrt(p.x * p.x + p.y * p.y);
                        if (dist < 40) {
                            center.removeChild(p);
                            particles.splice(i, 1);
                            astrolabeCore.scale.set(1.5); // 撞擊瞬間放大
                            astrolabeGrid.rotation -= 0.05; // 震動感
                        } else {
                            p.x -= (p.x / dist) * p.speed * delta;
                            p.y -= (p.y / dist) * p.speed * delta;
                        }
                    }
                }
            });
        }

        // --- 核心邏輯 ---
        async function initLIFF() {
            try {
                await liff.init({ liffId: ENV.ZIWEI_LIFF_ID }); 
                if (!liff.isLoggedIn()) { liff.login(); return; }
                currentIdToken = liff.getIDToken();
            } catch (err) {
                alert("無法開啟結界，請在 LINE 內部開啟！");
            }
        }

        function initDatePicker() {
            const ySelect = document.getElementById('input-year');
            const mSelect = document.getElementById('input-month');
            const dSelect = document.getElementById('input-day');

            for(let i = 2015; i >= 1940; i--) {
                let opt = new Option(i + ' 年', i);
                if(i === 1990) opt.selected = true;
                ySelect.add(opt);
            }
            for(let i = 1; i <= 12; i++) {
                let val = i < 10 ? '0'+i : i;
                mSelect.add(new Option(val + ' 月', val));
            }
            function updateDays() {
                const y = parseInt(ySelect.value), m = parseInt(mSelect.value);
                const days = new Date(y, m, 0).getDate();
                const current = dSelect.value;
                dSelect.innerHTML = ''; 
                for(let i = 1; i <= days; i++) {
                    let val = i < 10 ? '0'+i : i;
                    dSelect.add(new Option(val + ' 日', val));
                }
                if(current && current <= days) dSelect.value = current;
            }
            ySelect.onchange = mSelect.onchange = updateDays;
            updateDays();
        }

        window.onload = async () => {
            initPixiBackground(); // 啟動背景特效
            initDatePicker();
            await initLIFF();
        };

        function makeChoice(currentStep, key, value, btn) {
            userAstrolabeData[key] = value;
            const buttons = btn.parentElement.querySelectorAll('.btn-choice');
            buttons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            setTimeout(() => {
                document.getElementById(`step-${currentStep}`).classList.replace('active', 'exit-up');
                document.getElementById(`step-${currentStep + 1}`).classList.add('active');
            }, 300);
        }

        async function submitAstrolabe() {
            if (!userAstrolabeData.gender || !userAstrolabeData.calendar) {
                alert("宇宙訊號流失，請重新整理頁面。"); return;
            }

            const finalDate = `${document.getElementById('input-year').value}-${document.getElementById('input-month').value}-${document.getElementById('input-day').value}`;
            const time = document.getElementById('input-time').value;

            if(!confirm(`確認耗費靈力啟動命盤？\n\n這將進行深度的 108 星曜矩陣運算。`)) return;

            document.getElementById('btn-submit-main').disabled = true;
            userAstrolabeData.date = finalDate;
            userAstrolabeData.time = time;
            
            // 🌟 進入爆發期：淡出原本的表單，顯示下方純文字遮罩，並觸發特效暴走
            document.getElementById('step-3').classList.replace('active', 'exit-up');
            document.getElementById('loading-overlay').classList.add('show');
            isCalculating = true; // 啟動特效暴走

            const msgEl = document.getElementById('loading-msg');
            msgEl.innerText = "構築 12 宮位星辰網格...";

            try {
                setTimeout(() => { msgEl.innerText = "五行能量注入，解析阿卡西紀錄..."; }, 3500);

                const response = await fetch(`${ENV.API_BASE}/api/divination/ziwei`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentIdToken}` },
                    body: JSON.stringify({ birthData: userAstrolabeData })
                });

                const result = await response.json();

                if (result.success) {
                    msgEl.innerText = "天命具現化完成！";
                    
                    setTimeout(() => {
                        // 結束特效暴走，進入結果頁
                        isCalculating = false;
                        document.getElementById('loading-overlay').classList.remove('show');
                        document.getElementById('step-4').classList.add('active');
                        document.getElementById('result-text').innerText = result.replyText;
                    }, 1500);
                    
                } else {
                    throw new Error(result.msg || "解碼失敗，請稍後再試。");
                }

            } catch (error) {
                console.error("API 錯誤：", error);
                alert("🚨 結界異常：" + error.message);
                document.getElementById('loading-overlay').classList.remove('show');
                document.getElementById('step-3').classList.replace('exit-up', 'active');
                document.getElementById('btn-submit-main').disabled = false;
                isCalculating = false; // 恢復潛伏期
            }
        }
    </script>
</body>
</html>

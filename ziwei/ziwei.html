
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandDecoder - 命運解碼</title>
    <style>
        /* 🌌 宇宙深淵背景 */
        body {
            margin: 0; padding: 0;
            background-color: #0A0B10; /* 極深藍/黑 */
            color: #E0E0E0;
            font-family: 'Noto Serif TC', serif; /* 帶有神祕感的明體/襯線體 */
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* ✨ 轉場特效核心設定 */
        .step-container {
            position: absolute;
            text-align: center;
            width: 90%; max-width: 400px;
            /* 預設隱藏並往下沉 */
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none; /* 隱藏時不可點擊 */
        }

        /* 🟢 當前啟動的步驟 (淡入並上浮) */
        .step-container.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 🔴 離開的步驟 (淡出並往上飄) */
        .step-container.exit {
            opacity: 0;
            transform: translateY(-30px);
        }

        /* 📜 儀式感排版 */
        h2 { color: #D4AF37; font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; line-height: 1.5; }
        
        .btn-option {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #D4AF37; border-radius: 8px;
            color: #F9E498; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-option:hover { background: rgba(212, 175, 55, 0.2); transform: scale(1.02); }
        
        input[type="date"] {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05); border: 1px solid #D4AF37;
            color: #F9E498; font-size: 18px; border-radius: 8px; text-align: center; color-scheme: dark;
        }
    </style>
</head>
<body>

    <div id="step-1" class="step-container active">
        <h2>命運的齒輪，從陰陽開始轉動。<br>請選擇你的生理性別：</h2>
        <button class="btn-option" onclick="nextStep(1, 'male')">陽 (男)</button>
        <button class="btn-option" onclick="nextStep(1, 'female')">陰 (女)</button>
    </div>

    <div id="step-2" class="step-container">
        <h2>你習慣仰望太陽，<br>還是追隨月亮的軌跡？</h2>
        <button class="btn-option" onclick="nextStep(2, 'solar')">太陽 (國曆)</button>
        <button class="btn-option" onclick="nextStep(2, 'lunar')">月亮 (農曆)</button>
    </div>

    <div id="step-3" class="step-container">
        <h2>請輸入你降生於這個世界的年月。</h2>
        <input type="date" id="birth-date">
        <button class="btn-option" style="margin-top: 20px; background: #D4AF37; color: #000; font-weight: bold;" onclick="nextStep(3, document.getElementById('birth-date').value)">確認星辰座標</button>
    </div>

    <div id="step-4" class="step-container">
        <h2>星辰已就位。<br>即將為您注入靈力，解開專屬命運...</h2>
        <div id="loading-text" style="color: #888; margin-top: 20px;">[ 收集到的資料將顯示於此，準備發送給 AI 大腦 ]</div>
    </div>

    <script>
        // 用來暫存使用者的八字資料
        let birthData = {};

        function nextStep(currentStepIndex, value) {
            // 1. 儲存資料
            if(currentStepIndex === 1) birthData.gender = value;
            if(currentStepIndex === 2) birthData.calendar = value;
            if(currentStepIndex === 3) {
                if(!value) { alert("請輸入日期！"); return; }
                birthData.date = value;
            }

            // 2. 獲取當前與下一個容器
            const currentStep = document.getElementById(`step-${currentStepIndex}`);
            const nextStep = document.getElementById(`step-${currentStepIndex + 1}`);

            // 3. 觸發轉場動畫 (先讓當前畫面往上飄走)
            currentStep.classList.remove('active');
            currentStep.classList.add('exit');

            // 4. 等待 400 毫秒後，讓下一個畫面浮現
            setTimeout(() => {
                nextStep.classList.add('active');
                
                // 如果到了最後一步，秀出我們收集到的資料
                if(currentStepIndex === 3) {
                    document.getElementById('loading-text').innerText = 
                        `性別: ${birthData.gender === 'male' ? '男' : '女'} \n ` +
                        `曆法: ${birthData.calendar === 'solar' ? '國曆' : '農曆'} \n ` +
                        `日期: ${birthData.date} \n\n ` +
                        `🚀 (下一步：將這些資料與 30 點靈力打包，發送給我們剛寫好的 Gemini 3.1 Pro 大腦！)`;
                }
            }, 400); // 這個延遲時間創造了呼吸感
        }
    </script>
</body>
</html>
